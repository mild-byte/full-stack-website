services:
  frontend:
    build:
      context: ./my-fullstack-app/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - frontend
    depends_on:
      - backend

  backend:
    build:
      context: ./my-fullstack-app/backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=mysql
      - KAFKA_BROKER=kafka:9092 # Inside the backend network, it connects via the service name and internal port
    networks:
      - frontend
      - backend
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started

  mysql:
    image: debezium/example-mysql:2.5.4.Final
    ports:
      - "3306:3306" # Standardized back to native MySQL ports mapping
    env_file:
      - ./my-fullstack-app/.env
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - backend
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./empty.sql:/docker-entrypoint-initdb.d/inventory.sql

  kafka:
    image: apache/kafka:4.3.1
    ports:
      - "9094:9094" # Avoids host port conflicts while exposing external access
    env_file:
      - ./my-fullstack-app/.env
    networks:
      - backend # <--- PLACED IN THE BACKEND NETWORK WITH THE NODE APP AND MYSQL

volumes:
  mysql_data:
    driver: local

networks:
  frontend:
  backend: