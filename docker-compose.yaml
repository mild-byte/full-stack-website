services:
  frontend:
    build:
      context: ./my-fullstack-app/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - frontend
    depends_on:
      - backend

  backend:
    build:
      context: ./my-fullstack-app/backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    env_file:
      - ./my-fullstack-app/.env
    networks:
      - frontend
      - backend
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started

  # Debezium connector that watches MySQL binary logs
  connect:
    image: debezium/connect:2.5.4.Final
    ports:
      - "8083:8083"
    env_file:
      - ./my-fullstack-app/.env
    networks:
      - backend
    depends_on:
      - kafka
      - mysql

  # New consumer service to log database changes
  cdc-consumer:
    build:
      context: ./my-fullstack-app/backend
      dockerfile: Dockerfile
    command: ["cdc-consumer.js"]
    restart: unless-stopped
    env_file:
      - ./my-fullstack-app/.env
    networks:
      - backend
    depends_on:
      - kafka
      - connect

  mysql:
    image: debezium/example-mysql:2.5.4.Final
    ports:
      - "3306:3306"
    env_file:
      - ./my-fullstack-app/.env
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - backend
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./empty.sql:/docker-entrypoint-initdb.d/inventory.sql

  kafka:
    image: apache/kafka:4.3.1
    ports:
      - "9094:9094"
    env_file:
      - ./my-fullstack-app/.env
    networks:
      - backend

volumes:
  mysql_data:
    driver: local

networks:
  frontend:
  backend: